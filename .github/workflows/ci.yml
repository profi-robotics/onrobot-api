name: CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --dev

      - name: Compile Python sources
        run: uv run python -m compileall .

      - name: Ruff
        run: uv run ruff check .

      - name: Pytest
        run: uv run pytest -q

      - name: Build package
        run: uv build
